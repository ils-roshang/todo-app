steps:
  # Step 1: Build the Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO_NAME}/${_IMAGE_NAME}"
      - "."

  # Step 2: Push image to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO_NAME}/${_IMAGE_NAME}"

  # Step 3: Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "${_SERVICE_NAME}"
      - "--image=${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO_NAME}/${_IMAGE_NAME}"
      - "--region=${_REGION}"
      - "--platform=managed"
      - "--service-account=${_SERVICE_ACCOUNT}"
      - "--allow-unauthenticated"
      - "--set-env-vars=DB_USER=${_DB_USER}"
      - "--set-env-vars=DB_PASS=${_DB_PASS}"
      - "--set-env-vars=DB_NAME=${_DB_NAME}"
      - "--set-env-vars=CLOUD_SQL_CONNECTION_NAME=${_CLOUD_SQL_CONNECTION_NAME}"

images:
  - "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO_NAME}/${_IMAGE_NAME}"

options:
  logging: CLOUD_LOGGING_ONLY   # Avoid logs bucket requirement

substitutions:
  _PROJECT_ID: 'sureel-test'
  _REGION: 'us-central1'
  _REPO_NAME: 'hello-repo'
  _IMAGE_NAME: 'todo-app'
  _SERVICE_NAME: 'todo-app'
  _SERVICE_ACCOUNT: "roshang@sureel-test.iam.gserviceaccount.com"
  # Uncomment when connecting to Cloud SQL
  _CLOUDSQL_CONNECTION_NAME: 'sureel-test:us-central1:todo-app-db'
  _DB_USER: 'root'
  _DB_PASS: 'Todo-app12345'
  _DB_NAME: 'todo-app-db'
